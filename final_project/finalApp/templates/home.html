<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venture</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #646469;
      }

      .container {
        margin: 20px;
        background: #ffffff;
        border-radius: 40px;
        display: flex;
        padding: 20px;
        min-height: 90vh;
        gap: 20px;
      }

      .sidebar {
        width: 120px;
        background: #f05023;
        border-radius: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 10px;
        color: white;
      }

      .profile {
        width: 60px;
        height: 60px;
        background: white;
        border-radius: 50%;
        margin-bottom: 20px;
      }

      .nav-item {
        border: 1px solid white;
        border-radius: 10px;
        padding: 8px;
        margin: 6px 0;
        width: 100%;
        text-align: center;
        font-size: 14px;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .content {
        display: flex;
        gap: 20px;
        flex: 1;
      }

      .general {
        flex: 1;
        background: #f05023;
        border-radius: 30px;
        color: white;
        padding: 30px;
        text-align: center;
      }

      .calendar {
        width: 250px;
        background: #f05023;
        border-radius: 30px;
        color: white;
        padding: 30px;
        text-align: center;
      }

      h1,
      h2,
      h3 {
        margin: 10px 0;
      }

      .events-list {
        text-align: left;
        font-size: 24px;
        line-height: 1.8;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="profile"></div>
        <div class="nav-item">Home</div>
        <div class="nav-item">Explore</div>
        <div class="nav-item">Clubs</div>
        <div class="nav-item">Events</div>
        <div class="nav-item">Profile</div>
      </div>

      <div class="main">
        <div class="content">
          <div class="general">
            <h1>General</h1>

            <div></div>
            <p>General<br />Announcements</p>

            <div></div>
            <p>UTRGV Announcements/<br />Events</p>
          </div>

          <div class="calendar">
            <h2>Event<br />Calendar</h2>

            <div></div>

            <h3>Events List</h3>
            <div class="events-list">
              -<br />
              -<br />
              -<br />
              -<br />
              -
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
